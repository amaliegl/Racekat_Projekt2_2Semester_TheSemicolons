<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opret bruger</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="backgroundimage">
<div class="container">
    <h2>Opret bruger</h2>
    <form th:action="@{/register}" th:object="${user}" method="post" onsubmit="return validateTermsAndConditionsCheckbox(event)">
        <label class="inputLabel" for="email">Email*:</label>
        <input type="email" id="email" th:field="*{email}" required>
        <br>
        <label class="inputLabel" for="password">Password*:</label>
        <input type="password" id="password" th:field="*{password}" required>
        <br>
        <label class="inputLabel" for="name">Navn*:</label>
        <input type="text" id="name" th:field="*{name}" required>
        <br>
        <label class="inputLabel" for="phone">Telefon:</label>
        <input type="text" id="phone" th:field="*{phone}">
        <br>
        <p>* Obligatorisk felt</p>


        <div class="termsandconditionsbox">
            <label>
                <input class="termsandconditions" type="checkbox" name="terms" style="margin-bottom:15px">  Jeg accepterer <a href="#" class="link" onclick="termsAndConditionsClick()">privatlivspolitikken</a>
            </label>
        </div>

        <div class="error" th:text="${error}"></div>
        <p id="errorMsg" class="error"></p>
        <button type="submit">Registrér</button>
    </form>
    <div>
        <p>Allerede bruger? <a href="/login" class="link">Log ind</a></p>
    </div>
</div>
<script src="script.js"></script>
<div th:insert="~{parts/footer:: footer}"></div>
</body>
</html>
